<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2인 대전 포즈 추적 + 움직임 경쟁 (MediaPipe)</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #1a1d24;
      --accent: #2563eb;
      --text: #e6e8eb;
      --muted: #9aa0aa;
      --p1: #38bdf8;   /* 플레이어 1 색 (파랑) */
      --p2: #fb923c;   /* 플레이어 2 색 (주황) */
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Pretendard, -apple-system, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }
    h1 { font-size: 20px; margin: 8px 0 4px; }
    p.sub { color: var(--muted); margin: 0 0 16px; font-size: 14px; }

    /* 영상과 캔버스를 겹쳐서 관절선을 오버레이 */
    .stage {
      position: relative;
      width: 100%;
      max-width: 860px;
      aspect-ratio: 4 / 3;
      background: #000;
      border: 1px solid #2a2e37;
      border-radius: 12px;
      overflow: hidden;
    }
    #video, #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      /* 셀카처럼 좌우 반전 (원하지 않으면 이 줄 삭제) */
      transform: scaleX(-1);
    }
    #video { object-fit: cover; }

    /* 좌/우 영역 라벨 (영상 위에 고정, 반전 안 됨) */
    .zoneLabel {
      position: absolute;
      top: 10px;
      padding: 4px 10px;
      font-size: 13px;
      font-weight: 700;
      border-radius: 6px;
      background: rgba(0,0,0,0.45);
      pointer-events: none;
    }
    .zoneLabel.left  { left: 10px;  color: var(--p1); border: 1px solid var(--p1); }
    .zoneLabel.right { right: 10px; color: var(--p2); border: 1px solid var(--p2); }

    .controls {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    button.secondary { background: #333844; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    #status {
      margin-top: 12px;
      font-size: 13px;
      color: var(--muted);
      min-height: 18px;
      text-align: center;
    }

    /* ===== 경쟁(VS) 막대 ===== */
    .vsPanel {
      width: 100%;
      max-width: 860px;
      margin-top: 16px;
      background: var(--panel);
      border: 1px solid #2a2e37;
      border-radius: 12px;
      padding: 16px;
    }
    .vsHead {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 14px;
    }
    .vsHead .p1name { color: var(--p1); font-weight: 700; }
    .vsHead .p2name { color: var(--p2); font-weight: 700; }
    #leaderText { color: var(--muted); font-size: 13px; }

    /* 가운데에서 양쪽으로 채워지는 대결 막대 */
    .vsTrack {
      display: flex;
      height: 26px;
      border-radius: 8px;
      overflow: hidden;
      background: #262a33;
    }
    .vsFillP1 {
      height: 100%;
      width: 50%;
      background: var(--p1);
      transition: width 0.12s linear;
    }
    .vsFillP2 {
      height: 100%;
      width: 50%;
      background: var(--p2);
      transition: width 0.12s linear;
    }

    /* ===== 두 플레이어 상세 패널 ===== */
    .grid2 {
      width: 100%;
      max-width: 860px;
      margin-top: 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 640px) {
      .grid2 { grid-template-columns: 1fr; }
    }
    .scorePanel {
      background: var(--panel);
      border: 1px solid #2a2e37;
      border-radius: 12px;
      padding: 16px;
    }
    .scorePanel.p1 { border-top: 3px solid var(--p1); }
    .scorePanel.p2 { border-top: 3px solid var(--p2); }

    .scoreRow {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .scoreRow .label { font-size: 13px; color: var(--muted); }
    .scoreRow .value { font-size: 28px; font-weight: 700; }

    .barWrap {
      display: grid;
      grid-template-columns: 70px 1fr 52px;
      align-items: center;
      gap: 8px;
      margin: 8px 0;
      font-size: 12px;
    }
    .barTrack {
      height: 10px;
      background: #262a33;
      border-radius: 5px;
      overflow: hidden;
    }
    .barFill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 0.08s linear;
    }
    .barFill.arm  { background: #22d3ee; }
    .barFill.leg  { background: #f97316; }
    .barVal { text-align: right; color: var(--muted); }
  </style>
</head>
<body>
  <h1>2인 대전 포즈 추적</h1>
  <p class="sub">화면 좌·우로 분할 · 각 플레이어 독립 감지 · 움직임 실시간 경쟁</p>

  <div class="stage">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
    <div class="zoneLabel left">PLAYER 1</div>
    <div class="zoneLabel right">PLAYER 2</div>
  </div>

  <div class="controls">
    <button id="startBtn">카메라 시작</button>
    <button id="stopBtn" class="secondary" disabled>정지</button>
    <button id="resetBtn" class="secondary">누적 점수 초기화</button>
  </div>

  <div id="status">시작하려면 "카메라 시작"을 누르세요. (두 사람이 각각 좌·우에 서세요)</div>

  <!-- ===== 경쟁(VS) 막대 ===== -->
  <div class="vsPanel">
    <div class="vsHead">
      <span class="p1name">PLAYER 1 · <span id="vsP1Total">0</span></span>
      <span id="leaderText">동점</span>
      <span class="p2name"><span id="vsP2Total">0</span> · PLAYER 2</span>
    </div>
    <div class="vsTrack">
      <div class="vsFillP1" id="vsFillP1"></div>
      <div class="vsFillP2" id="vsFillP2"></div>
    </div>
  </div>

  <!-- ===== 두 플레이어 상세 패널 ===== -->
  <div class="grid2">
    <!-- Player 1 -->
    <div class="scorePanel p1">
      <div class="scoreRow">
        <span class="label">P1 현재 움직임</span>
        <span class="value" id="frameScore1">0</span>
      </div>
      <div class="scoreRow">
        <span class="label">P1 누적 점수</span>
        <span class="value" id="totalScore1" style="font-size:20px;">0</span>
      </div>
      <div class="barWrap"><span>팔</span><div class="barTrack"><div class="barFill arm" id="armBar1"></div></div><span class="barVal" id="armVal1">0</span></div>
      <div class="barWrap"><span>다리</span><div class="barTrack"><div class="barFill leg" id="legBar1"></div></div><span class="barVal" id="legVal1">0</span></div>
      <div class="barWrap"><span>몸통·머리</span><div class="barTrack"><div class="barFill" id="coreBar1"></div></div><span class="barVal" id="coreVal1">0</span></div>
    </div>

    <!-- Player 2 -->
    <div class="scorePanel p2">
      <div class="scoreRow">
        <span class="label">P2 현재 움직임</span>
        <span class="value" id="frameScore2">0</span>
      </div>
      <div class="scoreRow">
        <span class="label">P2 누적 점수</span>
        <span class="value" id="totalScore2" style="font-size:20px;">0</span>
      </div>
      <div class="barWrap"><span>팔</span><div class="barTrack"><div class="barFill arm" id="armBar2"></div></div><span class="barVal" id="armVal2">0</span></div>
      <div class="barWrap"><span>다리</span><div class="barTrack"><div class="barFill leg" id="legBar2"></div></div><span class="barVal" id="legVal2">0</span></div>
      <div class="barWrap"><span>몸통·머리</span><div class="barTrack"><div class="barFill" id="coreBar2"></div></div><span class="barVal" id="coreVal2">0</span></div>
    </div>
  </div>

  <!-- ===== MediaPipe 포즈 추적 로직 (인라인 모듈) ===== -->
  <script type="module">
    import {
      PoseLandmarker,
      FilesetResolver,
      DrawingUtils
    } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

    // ----- DOM 요소 -----
    const video     = document.getElementById("video");
    const canvas    = document.getElementById("overlay");
    const ctx       = canvas.getContext("2d");
    const startBtn  = document.getElementById("startBtn");
    const stopBtn   = document.getElementById("stopBtn");
    const resetBtn  = document.getElementById("resetBtn");
    const statusEl  = document.getElementById("status");

    // 경쟁(VS) 막대 DOM
    const vsFillP1  = document.getElementById("vsFillP1");
    const vsFillP2  = document.getElementById("vsFillP2");
    const vsP1Total = document.getElementById("vsP1Total");
    const vsP2Total = document.getElementById("vsP2Total");
    const leaderText = document.getElementById("leaderText");

    function el(id) { return document.getElementById(id); }

    // 플레이어별 상세 점수 DOM
    const ui = {
      1: {
        frame: el("frameScore1"), total: el("totalScore1"),
        armBar: el("armBar1"), legBar: el("legBar1"), coreBar: el("coreBar1"),
        armVal: el("armVal1"), legVal: el("legVal1"), coreVal: el("coreVal1")
      },
      2: {
        frame: el("frameScore2"), total: el("totalScore2"),
        armBar: el("armBar2"), legBar: el("legBar2"), coreBar: el("coreBar2"),
        armVal: el("armVal2"), legVal: el("legVal2"), coreVal: el("coreVal2")
      }
    };

    const drawingUtils = new DrawingUtils(ctx);

    let poseLandmarker = null;   // 모델 인스턴스
    let stream = null;           // 카메라 스트림
    let rafId = null;            // requestAnimationFrame 핸들
    let lastVideoTime = -1;      // 중복 프레임 방지용

    // ===== 플레이어별 상태 (이전 프레임 관절 + 점수를 완전히 분리 관리) =====
    let players = {
      1: makePlayerState(),
      2: makePlayerState()
    };
    function makePlayerState() {
      return { prev: null, total: 0, smooth: 0, arm: 0, leg: 0, core: 0 };
    }

    // 플레이어별 스켈레톤 색
    const PLAYER_COLOR = {
      1: { line: "#38bdf8", dot: "#0ea5e9" },
      2: { line: "#fb923c", dot: "#f97316" }
    };

    /*
     * 관절별 가중치 정의. (MediaPipe Pose 33개 랜드마크 기준)
     * 팔·다리의 끝(손목/발목)일수록 가중치를 크게 주어
     * 큰 동작이 점수에 더 강하게 반영되도록 설계.
     */
    const JOINT_WEIGHTS = {
      // ----- 팔 (arm) -----
      11: { w: 1.2, group: "arm" },  // 왼 어깨
      12: { w: 1.2, group: "arm" },  // 오른 어깨
      13: { w: 2.0, group: "arm" },  // 왼 팔꿈치
      14: { w: 2.0, group: "arm" },  // 오른 팔꿈치
      15: { w: 3.0, group: "arm" },  // 왼 손목
      16: { w: 3.0, group: "arm" },  // 오른 손목
      17: { w: 2.5, group: "arm" },  // 왼 새끼손가락
      18: { w: 2.5, group: "arm" },  // 오른 새끼손가락
      19: { w: 2.5, group: "arm" },  // 왼 검지
      20: { w: 2.5, group: "arm" },  // 오른 검지
      21: { w: 2.5, group: "arm" },  // 왼 엄지
      22: { w: 2.5, group: "arm" },  // 오른 엄지

      // ----- 다리 (leg) -----
      23: { w: 1.2, group: "leg" },  // 왼 엉덩이
      24: { w: 1.2, group: "leg" },  // 오른 엉덩이
      25: { w: 2.0, group: "leg" },  // 왼 무릎
      26: { w: 2.0, group: "leg" },  // 오른 무릎
      27: { w: 3.0, group: "leg" },  // 왼 발목
      28: { w: 3.0, group: "leg" },  // 오른 발목
      29: { w: 2.5, group: "leg" },  // 왼 뒤꿈치
      30: { w: 2.5, group: "leg" },  // 오른 뒤꿈치
      31: { w: 2.5, group: "leg" },  // 왼 발끝
      32: { w: 2.5, group: "leg" },  // 오른 발끝

      // ----- 몸통·머리 (core) : 가중치 낮게 -----
      0:  { w: 0.5, group: "core" }, // 코
      1:  { w: 0.4, group: "core" },
      2:  { w: 0.4, group: "core" },
      3:  { w: 0.4, group: "core" },
      4:  { w: 0.4, group: "core" },
      5:  { w: 0.4, group: "core" },
      6:  { w: 0.4, group: "core" },
      7:  { w: 0.5, group: "core" }, // 왼 귀
      8:  { w: 0.5, group: "core" }, // 오른 귀
      9:  { w: 0.4, group: "core" },
      10: { w: 0.4, group: "core" }
    };

    const SCORE_SCALE = 1200;     // 점수 스케일 (정규화 이동량이 작아 크게 곱함)
    const NOISE_THRESHOLD = 0.004; // 미세 떨림(노이즈) 무시 임계값
    const VISIBILITY_MIN = 0.5;    // 신뢰도 낮은 관절 제외 기준

    // 1) 모델 로드
    async function createPoseLandmarker() {
      setStatus("모델을 불러오는 중...");
      const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
      );
      poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
          delegate: "GPU"
        },
        runningMode: "VIDEO",
        numPoses: 2              // 두 명까지 감지
      });
      setStatus("모델 로드 완료. 카메라를 켭니다...");
    }

    // 2) 카메라 권한 요청 + 스트림 연결
    async function startCamera() {
      startBtn.disabled = true;
      try {
        if (!poseLandmarker) {
          await createPoseLandmarker();
        }
        stream = await navigator.mediaDevices.getUserMedia({
          video: { width: 960, height: 720, facingMode: "user" },
          audio: false
        });
        video.srcObject = stream;

        video.addEventListener("loadeddata", () => {
          canvas.width  = video.videoWidth;
          canvas.height = video.videoHeight;
          stopBtn.disabled = false;
          players[1].prev = null;
          players[2].prev = null;
          setStatus("추적 중... 좌:P1, 우:P2. 더 많이 움직이는 쪽이 앞서갑니다!");
          predictLoop();
        }, { once: true });

      } catch (err) {
        console.error(err);
        setStatus("카메라를 시작할 수 없습니다: " + err.message);
        startBtn.disabled = false;
      }
    }

    // 3) 매 프레임 추론 + 그리기 + 플레이어별 점수
    function predictLoop() {
      if (video.currentTime !== lastVideoTime) {
        lastVideoTime = video.currentTime;

        const nowMs = performance.now();
        const result = poseLandmarker.detectForVideo(video, nowMs);

        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawDivider();

        const assigned = assignPlayers(result.landmarks || []);

        for (const pid of [1, 2]) {
          const landmarks = assigned[pid];
          if (landmarks) {
            const col = PLAYER_COLOR[pid];
            drawingUtils.drawConnectors(
              landmarks,
              PoseLandmarker.POSE_CONNECTIONS,
              { color: col.line, lineWidth: 3 }
            );
            drawingUtils.drawLandmarks(landmarks, { color: col.dot, radius: 4 });
          }
          computeMovementScore(landmarks, pid);
        }

        ctx.restore();
        updateAllUI();
      }
      rafId = requestAnimationFrame(predictLoop);
    }

    // 중앙 분할선
    function drawDivider() {
      ctx.save();
      ctx.strokeStyle = "rgba(255,255,255,0.35)";
      ctx.lineWidth = 2;
      ctx.setLineDash([10, 10]);
      ctx.beginPath();
      ctx.moveTo(canvas.width / 2, 0);
      ctx.lineTo(canvas.width / 2, canvas.height);
      ctx.stroke();
      ctx.restore();
    }

    /*
     * 감지된 여러 포즈를 화면상 좌·우 위치로 P1/P2에 배정.
     * 영상이 CSS로 좌우 반전되어 있어 화면상 x = 1 - 원본 x.
     * 화면 왼쪽 = P1, 오른쪽 = P2.
     */
    function assignPlayers(posesList) {
      const res = { 1: null, 2: null };
      if (posesList.length === 0) return res;

      const items = posesList.map(lm => ({ lm, vx: 1 - bodyCenterX(lm) }));

      if (items.length === 1) {
        if (items[0].vx < 0.5) res[1] = items[0].lm;
        else                   res[2] = items[0].lm;
        return res;
      }
      items.sort((a, b) => a.vx - b.vx);
      res[1] = items[0].lm;
      res[2] = items[items.length - 1].lm;
      return res;
    }

    // 몸통 중심(어깨·엉덩이) x 평균
    function bodyCenterX(lm) {
      const idx = [11, 12, 23, 24];
      let sum = 0, c = 0;
      for (const i of idx) {
        if (lm[i]) { sum += lm[i].x; c++; }
      }
      if (c === 0) { for (const p of lm) { sum += p.x; c++; } }
      return sum / c;
    }

    /*
     * 이전 프레임과 현재 프레임의 관절 거리로 가중치 점수 산출.
     * (플레이어별 독립 상태 사용)
     */
    function computeMovementScore(landmarks, pid) {
      const st = players[pid];

      // 이 프레임에 해당 플레이어가 없으면 값 감쇠 후 종료
      if (!landmarks) {
        st.prev = null;
        st.smooth *= 0.7;
        st.arm = st.leg = st.core = 0;
        return;
      }
      // 첫 등장이면 저장만 하고 종료
      if (!st.prev) {
        st.prev = cloneLandmarks(landmarks);
        st.arm = st.leg = st.core = 0;
        return;
      }

      let armSum = 0, legSum = 0, coreSum = 0;

      for (let i = 0; i < landmarks.length; i++) {
        const info = JOINT_WEIGHTS[i];
        if (!info) continue;

        const cur  = landmarks[i];
        const prev = st.prev[i];
        if (!prev) continue;
        if ((cur.visibility ?? 1) < VISIBILITY_MIN) continue;

        const dx = cur.x - prev.x;
        const dy = cur.y - prev.y;
        const dz = (cur.z ?? 0) - (prev.z ?? 0);
        let dist = Math.sqrt(dx * dx + dy * dy + dz * dz);

        if (dist < NOISE_THRESHOLD) dist = 0;   // 미세 떨림 제거

        const weighted = dist * info.w * SCORE_SCALE;

        if (info.group === "arm")       armSum  += weighted;
        else if (info.group === "leg")  legSum  += weighted;
        else                            coreSum += weighted;
      }

      const frameScore = armSum + legSum + coreSum;

      st.smooth = st.smooth * 0.7 + frameScore * 0.3;
      st.total += frameScore;
      st.arm = armSum; st.leg = legSum; st.core = coreSum;

      st.prev = cloneLandmarks(landmarks);
    }

    function cloneLandmarks(landmarks) {
      return landmarks.map(p => ({ x: p.x, y: p.y, z: p.z, visibility: p.visibility }));
    }

    // 모든 UI 갱신
    function updateAllUI() {
      const cap = 100;
      const pct = v => Math.min(100, (v / cap) * 100);

      for (const pid of [1, 2]) {
        const st = players[pid];
        const u = ui[pid];
        u.frame.textContent = Math.round(st.smooth);
        u.total.textContent = Math.round(st.total).toLocaleString();
        u.armBar.style.width  = pct(st.arm)  + "%";
        u.legBar.style.width  = pct(st.leg)  + "%";
        u.coreBar.style.width = pct(st.core) + "%";
        u.armVal.textContent  = Math.round(st.arm);
        u.legVal.textContent  = Math.round(st.leg);
        u.coreVal.textContent = Math.round(st.core);
      }

      // 경쟁 막대: 누적 점수 비율로 좌우 채움
      const t1 = players[1].total;
      const t2 = players[2].total;
      const comb = t1 + t2;
      const p1pct = comb > 0 ? (t1 / comb) * 100 : 50;

      vsFillP1.style.width = p1pct + "%";
      vsFillP2.style.width = (100 - p1pct) + "%";
      vsP1Total.textContent = Math.round(t1).toLocaleString();
      vsP2Total.textContent = Math.round(t2).toLocaleString();

      const diff = Math.round(Math.abs(t1 - t2));
      if (comb === 0)      leaderText.textContent = "동점";
      else if (t1 > t2)    leaderText.textContent = "P1 리드 (+" + diff.toLocaleString() + ")";
      else if (t2 > t1)    leaderText.textContent = "P2 리드 (+" + diff.toLocaleString() + ")";
      else                 leaderText.textContent = "동점";
    }

    // 4) 정지
    function stopCamera() {
      if (rafId) cancelAnimationFrame(rafId);
      rafId = null;
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }
      video.srcObject = null;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      players[1].prev = null;
      players[2].prev = null;
      startBtn.disabled = false;
      stopBtn.disabled = true;
      setStatus("정지되었습니다.");
    }

    // 누적 점수 초기화
    function resetScore() {
      players[1] = makePlayerState();
      players[2] = makePlayerState();
      updateAllUI();
      setStatus("두 플레이어의 누적 점수를 초기화했습니다.");
    }

    function setStatus(msg) { statusEl.textContent = msg; }

    startBtn.addEventListener("click", startCamera);
    stopBtn.addEventListener("click", stopCamera);
    resetBtn.addEventListener("click", resetScore);
  </script>
</body>
</html>
